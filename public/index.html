<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillBridge Pro | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
    <div class="logo">SkillBridge</div>
    
    <div class="nav-links">
        <a href="#" class="active">My Matches</a>
    </div>
     <div class="nav-search-bar">
        <input type="text" id="pc-search-input" placeholder="Search by skill (e.g. Python, React)...">
        <button class="search-btn-inner" onclick="handleSearch()">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
    </div>
     <div class="nav-links">
        <a href="#" class="active">Inbox</a>
    </div>
    <div class="nav-user">
        <i class="fa-regular fa-bell"></i>
    </div>
</nav>

    <div class="container">
        <aside class="sidebar-left">
            <div class="card profile-mini">
                <h3>Hemant Rai</h3>
                <p>B.Tech CS Student</p>
                <div class="badge">Verified</div>
            </div>
            
        </aside>

        <main id="match-feed">
            <h2 class="section-title">New Matches for You</h2>
            <div id="loader" class="loader">Calculating Compatibility...</div>
            </main>

        
    </div>

    <script src="app.js"></script>
</body>
</html>
