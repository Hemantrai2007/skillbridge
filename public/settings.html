<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>
<script src="theme.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="settings.css">
</head>

<body>
<nav class="side-nav">
    <div class="side-nav-top">
        <a href="profile.html" class="nav-profile-circle" id="userCircle">NV</a>
        <a href="index.html" class="nav-item">
            <i class="fa-solid fa-layer-group"></i>
            <span class="nav-label">Dashboard</span>
        </a>
        <a href="chat.html" class="nav-item">
            <i class="fa-solid fa-message"></i>
            <span class="nav-label">Chat</span>
        </a>
    </div>
    <div class="sidebar-bottom">
        <a href="settings.html">
            <i class="fa-solid fa-gear"></i>
            <span class="nav-label">Settings</span>
        </a>
    </div>
</nav>

<div class="main">
    <h1>Settings</h1>

    <div class="section">
        <h2>Security</h2>
        
        <div class="setting-item">
            <span>Logout</span>
            <button class="btn" onclick="logout()">Logout</button>
        </div>
        <div class="setting-item">
            <span>Delete Account</span>
            <button class="btn-danger" onclick="deleteAccount()">Delete</button>
        </div>
    </div>

    <div class="section">
        <h2>Notifications</h2>
        <div class="setting-item">
            <span>Email Notifications</span>
            <div class="toggle" onclick="toggleSwitch(this, 'emailNotif')"></div>
        </div>
        <div class="setting-item">
            <span>Message Alerts</span>
            <div class="toggle" onclick="toggleSwitch(this, 'msgNotif')"></div>
        </div>
    </div>

    <div class="section">
        <h2>Appearance</h2>
        <div class="setting-item">
            <span>Dark Mode</span>
            <div class="toggle" id="dark-mode-toggle" onclick="toggleDarkMode(this)"></div>
        </div>
    </div>

</div>

<script>
function toggleSwitch(el, key) {
    el.classList.toggle("active");
    localStorage.setItem(key, el.classList.contains("active"));
}

window.onload = () => {
    ["emailNotif", "msgNotif", "visibility", "showEmail"].forEach(key => {
        document.querySelectorAll(".toggle").forEach(t => {
            if (t.getAttribute("onclick")?.includes(key) && localStorage.getItem(key) === "true") {
                t.classList.add("active");
            }
        });
    });
    
    if (localStorage.getItem("darkMode") === "true") {
        document.getElementById("dark-mode-toggle").classList.add("active");
    }
};

function logout() {
    console.log("In log out function");
    setTimeout(()=>{
        window.location.href="signin.html";
    },1000);
}

function changePassword() {
    alert("Connect Firebase password change here");
}

async function deleteAccount() {
   const email = localStorage.getItem("gmail");

        if (!email) {
            alert("Please login first");
            window.location.href = "signin.html";
            return;
        }

        try{

            const res = await fetch("http://localhost:8000/auth/delete_account",
            {
                method :"DELETE",
                headers : {
                    "Content-Type" : "application/json"
                },
                body: JSON.stringify({ email })
             }
            );
            const data = await res.json();

            if(data.success){
                console.log("Account Deleted successfully");
                alert("Account Deleted successfully");
                setTimeout(()=>{
                    window.location.href="signup.html";
                },1000);
            }else{
                console.log(data.message);
                alert("some issue in deleting");
            }

        }catch(error){
            alert("Server Issue");
        }
}

window.addEventListener("DOMContentLoaded", () => {
    updateUserCircle();
});

function updateUserCircle() {
    const username = localStorage.getItem("username");
    const circle = document.getElementById("userCircle");

    if (!username || !circle) return;

    const initials = username
        .trim()
        .split(" ")
        .map(word => word[0])
        .join("")
        .substring(0, 2)
        .toUpperCase();

    circle.textContent = initials;
}
</script>
</body>
</html>
