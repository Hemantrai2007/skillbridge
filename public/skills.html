<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SkillBridge - Skills</title>
    <link rel="stylesheet" href="skillss.css">
</head>
<body>

<div class="main-container">

    <!-- LEFT (FORM) -->
    <div class="left-section">
        <h1 class="logo">SkillBridge</h1>
        <p class="tagline">Build your skill exchange</p>

        <form>

            <!-- REQUIRED -->
            <label>Skills You Need</label>
            <select id="requiredSkill" onchange="checkOther('required')">
                <option value="">Select Required Skill</option>
                <option>C Programming</option>
                <option>Java</option>
                <option>Python</option>
                <option>Data Structures</option>
                <option>Machine Learning</option>
                <option>Cybersecurity</option>
                <option value="other">Other</option>
            </select>

            <input type="text" id="requiredOther" placeholder="Enter required skill">


            <!-- OFFERED -->
            <label>Skills You Offer</label>
            <select id="offeredSkill" onchange="checkOther('offered')">
                <option value="">Select Offered Skill</option>
                <option>Frontend Development</option>
                <option>Backend Development</option>
                <option>Full Stack</option>
                <option>Teaching</option>
                <option>Public Speaking</option>
                <option value="other">Other</option>
            </select>

            <input type="text" id="offeredOther" placeholder="Enter offered skill">

            <button type="submit">Find Matches</button>

        </form>
    </div>


    <!-- RIGHT (IMAGE SIDE SAME AS SIGNUP) -->
    <div class="right-section">
        <div class="image-box">
            <img src="https://static.vecteezy.com/system/resources/previews/052/940/989/non_2x/isometric-illustration-shows-students-engaging-with-online-education-platform-featuring-laptop-books-graduation-cap-scientific-elements-and-english-language-learning-resources-vector.jpg" alt="Skill Illustration">
        </div>
        <h2>Exchange skills, not money</h2>
        <p>Find people who need your skills and trade what you know.</p>
    </div>

</div>

<script>
function checkOther(type) {
    if (type === 'required') {
        let val = document.getElementById("requiredSkill").value;
        document.getElementById("requiredOther").style.display = val === "other" ? "block" : "none";
    }

    if (type === 'offered') {
        let val = document.getElementById("offeredSkill").value;
        document.getElementById("offeredOther").style.display = val === "other" ? "block" : "none";
    }
}
</script>

</body>
</html>
